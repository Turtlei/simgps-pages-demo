<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maintenance</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

<div class="maintenance-container">

  <!-- LEFT SIDE -->
  <div class="maintenance-left">
    <h1>Under Construction</h1>
    <p>
      We’re improving the system to give you a better experience.
      Please leave your email below to get notified.
    </p>

    <form class="notify-form">
      <input type="email" placeholder="Enter your email" required>
      <button type="submit">Notify Me</button>
    </form>
  </div>

  <!-- RIGHT SIDE -->
  <div class="maintenance-right">

    <div class="circular-countdown">

      <!-- Days -->
      <div class="progress-circle">
        <svg>
          <circle class="bg"></circle>
          <circle class="progress" id="daysCircle"></circle>
        </svg>
        <div class="label">
          <span id="m_days">0</span>
          <small>Days</small>
        </div>
      </div>

      <!-- Hours -->
      <div class="progress-circle">
        <svg>
          <circle class="bg"></circle>
          <circle class="progress" id="hoursCircle"></circle>
        </svg>
        <div class="label">
          <span id="m_hours">0</span>
          <small>Hours</small>
        </div>
      </div>

      <!-- Minutes -->
      <div class="progress-circle">
        <svg>
          <circle class="bg"></circle>
          <circle class="progress" id="minutesCircle"></circle>
        </svg>
        <div class="label">
          <span id="m_minutes">0</span>
          <small>Minutes</small>
        </div>
      </div>

      <!-- Seconds -->
      <div class="progress-circle">
        <svg>
          <circle class="bg"></circle>
          <circle class="progress" id="secondsCircle"></circle>
        </svg>
        <div class="label">
          <span id="m_seconds">0</span>
          <small>Seconds</small>
        </div>
      </div>

    </div>

  </div>

</div>

<script src="../assets/js/script.js"></script>

</body>
</html>
