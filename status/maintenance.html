<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maintenance</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

<div class="maintenance-container">

  <!-- LEFT SIDE -->
  <div class="maintenance-left">
    <h1>Under Construction</h1>
    <p>
      We're improving the system to give you a better experience.
      Please leave your email below to get notified.
    </p>

    <form class="notify-form">
      <input type="email" placeholder="Enter your email" required>
      <button type="submit">Notify Me</button>
    </form>
  
  
  <div class="stay-touch">
  <p>Follow us</p>

    <div class="social-links">

      <a href="https://instagram.com" target="_blank">
        <i class="fa-brands fa-instagram"></i>
      </a>

      <a href="https://twitter.com" target="_blank">
        <i class="fa-brands fa-x-twitter"></i>
      </a>

      <a href="https://linkedin.com" target="_blank">
        <i class="fa-brands fa-linkedin-in"></i>
      </a>

    </div>
  </div>
</div>
  <!-- RIGHT SIDE -->
  <div class="maintenance-right">

    <div class="circular-countdown">

      <!-- Days -->
      <div class="progress-circle">
        <svg viewBox="0 0 120 120">
          <circle class="bg" cx="60" cy="60" r="52"></circle>
          <circle class="progress" cx="60" cy="60" r="52" id="daysCircle"></circle>
        </svg>
        <div class="label">
          <span id="m_days">0</span>
          <small>Days</small>
        </div>
      </div>

      <!-- Hours -->
      <div class="progress-circle">
        <svg viewBox="0 0 120 120">
          <circle class="bg" cx="60" cy="60" r="52"></circle>
          <circle class="progress" cx="60" cy="60" r="52" id="hoursCircle"></circle>
        </svg>
        <div class="label">
          <span id="m_hours">0</span>
          <small>Hours</small>
        </div>
      </div>

      <!-- Minutes -->
      <div class="progress-circle">
        <svg viewBox="0 0 120 120">
          <circle class="bg" cx="60" cy="60" r="52"></circle>
          <circle class="progress" cx="60" cy="60" r="52" id="minutesCircle"></circle>
        </svg>
        <div class="label">
          <span id="m_minutes">0</span>
          <small>Minutes</small>
        </div>
      </div>

      <!-- Seconds -->
      <div class="progress-circle">
        <svg viewBox="0 0 120 120">
          <circle class="bg" cx="60" cy="60" r="52"></circle>
          <circle class="progress" cx="60" cy="60" r="52" id="secondsCircle"></circle>
        </svg>
        <div class="label">
          <span id="m_seconds">0</span>
          <small>Seconds</small>
        </div>
      </div>

    </div>

  </div>

</div>

<script src="../assets/js/script.js"></script>

</body>
</html>
