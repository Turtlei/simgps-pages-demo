<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maintenance</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

<div class="page-container coming-soon">

  <div class="coming-content">

    <div class="page-card">

      <h1>System Maintenance</h1>

      <p>
        Our system is currently undergoing scheduled maintenance
        to improve performance and reliability.
        Please check back soon.
      </p>

      <!-- COUNTDOWN -->
      <div class="countdown">

        <div>
          <span id="m_days">00</span>
          <small>Days</small>
        </div>

        <div>
          <span id="m_hours">00</span>
          <small>Hours</small>
        </div>

        <div>
          <span id="m_minutes">00</span>
          <small>Minutes</small>
        </div>

        <div>
          <span id="m_seconds">00</span>
          <small>Seconds</small>
        </div>

      </div>

      <!-- NOTIFY -->
      <form class="notify-form">
        <input type="email" placeholder="Enter your email">
        <button type="submit">Notify Me</button>
      </form>

      <!-- FOLLOW -->
      <div class="stay-touch">

        <p>Follow Us</p>

        <div class="social-links">
          <a href="https://instagram.com"><i class="fab fa-instagram"></i></a>
          <a href="https://twitter.com"><i class="fab fa-twitter"></i></a>
          <a href="http://linkedin.com"><i class="fab fa-linkedin"></i></a>
        </div>

      </div>

    </div>

  </div>

</div>

<script src="../assets/js/script.js"></script>

</body>
</html>
