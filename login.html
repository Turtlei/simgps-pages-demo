<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIMGPS - Login</title>
  <link rel="stylesheet" href="assets/css/login.css">
</head>
<body>

<div class="container">

  <div class="left-side">
    <div class="left-content">
      <h2>Welcome to SIMGPS</h2>
      <p>Sistem Inventory Manajemen GPS yang efisien dan terstruktur.</p>
    </div>
  </div>

  <div class="right-side">

    <div class="content">
  <!-- ICON -->
    <div class="top-logo">
      <svg width="70" height="70" viewBox="0 0 24 24" fill="#1e3c72">
        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 
                 9.5c-1.38 0-2.5-1.12-2.5-2.5S10.62 6.5 12 6.5s2.5 1.12 
                 2.5 2.5-1.12 2.5-2.5 2.5z"/>
      </svg>
    </div>

    <div class="card">
      <h1>SIMGPS</h1>
      <p class="subtitle">Sistem Inventory Manajemen GPS</p>
      <form onsubmit="return handleLogin(event)">
        <div class="input-group">
          <input type="email" placeholder="Email address" required>
        </div>

        <div class="input-group">
          <input type="password" id="password" placeholder="Password" required>
          <span class="toggle" onclick="togglePassword()">Show</span>
        </div>

        <button type="submit" class="btn">Login</button>
      </form>
      
    </div>
    </div>

    <footer class="copyright">
    &copy; 2026 Global Promedika Service. All rights reserved
    </footer>

  </div>
</div>

<script src="assets/js/login.js"></script>
</body>
</html>
