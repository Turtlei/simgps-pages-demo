<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIMGPS - Login</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <link rel="stylesheet" href="assets/css/login.css">
</head>
<body>

<div class="container">

  <div class="left-side">
    <div class="left-content">
      <h2>Welcome to SIMGPS</h2>
      <p>Sistem Inventory Manajemen GPS yang efisien dan terstruktur.</p>
    </div>
  </div>

  <div class="right-side">

    <div class="content">
  <!-- ICON -->
   <div class="top-logo">
    <i class="fa-solid fa-heartbeat"></i>
</div>
    <div class="card">
      <h1>SIMGPS</h1>
      <p class="subtitle">Sistem Inventory Manajemen GPS</p>
      <form onsubmit="return handleLogin(event)">
        <div class="input-group">
          <input type="email" placeholder="Email address" required>
        </div>

        <div class="input-group">
          <input type="password" id="password" placeholder="Password" required>
          <span class="toggle" onclick="togglePassword()">Show</span>
        </div>

        <button type="submit" class="btn">Login</button>
      </form>
      
    </div>
    </div>

    <footer class="copyright">
    &copy; 2026 Global Promedika Service. All rights reserved
    </footer>

  </div>
</div>

<script src="assets/js/login.js"></script>
</body>
</html>
